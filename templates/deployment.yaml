apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "throttler.name" . }}-app
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "throttler.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "throttler.selectorLabels" . | nindent 6 }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "throttler.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.containerPort.http }}
              protocol: TCP

          # ── Probes ───────────────────────────────────────────────────────────
          {{- with .Values.startupProbe }}
          startupProbe:
            httpGet:
              path: {{ .httpGet.path }}
              port: {{ .httpGet.port }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            httpGet:
              path: {{ .httpGet.path }}
              port: {{ .httpGet.port }}
          {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            httpGet:
              path: {{ .httpGet.path }}
              port: {{ .httpGet.port }}
          {{- end }}

          # ── Resources ────────────────────────────────────────────────────────
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Environment Variables ─────────────────────────────────────────────
          env:
            # Plain env vars — simple key/value loop
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}

            # Secret env vars — loop over each secret group, then each key
            {{- range $groupName, $group := .Values.secrets }}
            {{- range $envName, $secretKey := $group.keys }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $group.secretName }}
                  key: {{ $secretKey }}
            {{- end }}
            {{- end }}
